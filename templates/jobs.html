{% extends "base.html" %}
{% block content %}

<h2 style="margin-left:20px;">Available Jobs</h2>

<div class="job-list">
    {% for job in jobs %}
    <div class="job-card">
        <h3>{{ job.title }}</h3>
        <p>{{ job.company }} - {{ job.location }}</p>
        <a class="primary-btn small" href="/apply/{{ job.id }}">Apply</a>
    </div>
    {% endfor %}
</div>

{% endblock %}

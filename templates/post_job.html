{% extends "base.html" %}
{% block content %}

<div class="center-form">
<div class="form-card large">
<h2>Post Job</h2>

<form method="POST" enctype="multipart/form-data">

<input name="title" placeholder="Job Title" required>
<input name="company" placeholder="Company Name" required>
<input name="location" placeholder="Location" required>

<input name="salary" placeholder="Salary (ex: ₹25,000 – ₹40,000)">
<input name="job_type" placeholder="Job Type (Full-Time / Part-Time)">
<input name="experience" placeholder="Experience (ex: 1–3 years)">
<input type="date" name="deadline">

<textarea name="description" placeholder="Job Description" rows="4"></textarea>

Upload Company Logo:
<input type="file" name="logo">

<button class="primary-btn">Post Job</button>

</form>
</div>
</div>

{% endblock %}
